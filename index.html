<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>河洛时空 HeLuo Studio</title>
    <style>
        /* 极简深色主题 */
        :root {
            --bg-black: #030505;
            --panel-blue: #061118;
            --text-cyan: #c2eae0;
            --neon-cyan: #00ffcc;
            --bamboo: #7ebdae;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-cyan);
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        /* 躯干容器：在电脑端限制600px，在手机端则是满屏（带点间距） */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        /* 服务卡片：绝对防折行逻辑 */
        .card {
            background: var(--panel-blue);
            border: 1px solid #0a2e24;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
        }

        /* 左侧文字区：允许缩小，但不允许压缩文字本身 */
        .info { 
            overflow: hidden; 
            margin-right: 10px;
        }
        .name { color: var(--neon-cyan); font-size: 1.1rem; white-space: nowrap; }
        .sub { color: var(--bamboo); font-size: 0.75rem; }

        /* 右侧价格区：核心逻辑！强制一行，绝不折行 */
        .price { 
            white-space: nowrap; 
            flex-shrink: 0; 
            text-align: right; 
        }
        .p-zh { font-size: 1rem; color: var(--text-cyan); }
        .p-en { font-size: 0.75rem; color: var(--bamboo); }

        /* 立即沟通按钮：防爆逻辑 */
        .contact-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--bamboo);
            color: var(--neon-cyan);
            border-radius: 4px;
            margin-top: 30px;
            white-space: nowrap;
        }

        /* 尾部：确保在窄屏下也能一行放下 */
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--bamboo);
        }
        
        /* 手机端专门适配 */
        @media (max-width: 400px) {
            .name { font-size: 0.95rem; }
            .p-zh { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--neon-cyan); font-weight: 300;">河洛时空</h1>
            <div style="color: var(--bamboo); letter-spacing: 2px;">HELUO STUDIO</div>
        </div>

        <div class="card">
            <div class="info">
                <div class="name">高维咨询</div>
                <div class="sub">High-Dimensional Consulting</div>
            </div>
            <div class="price">
                <div class="p-zh">¥ 3,000 / 次起</div>
                <div class="p-en">From $420 / Session</div>
            </div>
        </div>

        <div class="card">
            <div class="info">
                <div class="name">专项课程</div>
                <div class="sub">Specialized Courses</div>
            </div>
            <div class="price">
                <div class="p-zh">价格面议</div>
                <div class="p-en">Price Negotiable</div>
            </div>
        </div>

        <button class="contact-btn">立即沟通 (Initiate Request)</button>

        <div class="footer">
            Refund Policy | Privacy Policy | Terms of Service
            <div style="margin-top: 10px;">&copy; 2026 HeLuo Studio.</div>
        </div>
    </div>
</body>
</html>
