<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河洛咨询 - 时空研判与认知对齐</title>
    <style>
        :root {
            --bg-deep-blue: #010512;
            --border-dark-green: #0d211c;
            --text-primary-cyan: #00ffcc;
            --text-bamboo-green: #10b981;
        }
        body { margin: 0; background-color: var(--bg-deep-blue); color: #fff; font-family: sans-serif; }
        
        /* 页面基础架构 */
        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .title { color: var(--text-primary-cyan); font-size: 2rem; margin-bottom: 20px; }
        .description { color: var(--text-bamboo-green); line-height: 1.8; margin-bottom: 40px; }
        
        .contact-btn {
            background: transparent;
            color: var(--text-primary-cyan);
            border: 1px solid var(--text-bamboo-green);
            padding: 15px 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .contact-btn:hover { background: var(--text-bamboo-green); color: var(--bg-deep-blue); }

        /* 弹窗核心样式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-deep-blue); border: 1px solid var(--border-dark-green);
            padding: 35px; width: 90%; max-width: 450px; border-radius: 8px; position: relative;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; color: var(--text-bamboo-green); background: none; border: none; font-size: 20px; cursor: pointer; }
        .modal-title { color: var(--text-primary-cyan); font-size: 18px; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { color: var(--text-bamboo-green); font-size: 13px; margin-bottom: 8px; display: block; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #000; border: 1px solid var(--border-dark-green);
            color: var(--text-primary-cyan); padding: 12px; border-radius: 4px; box-sizing: border-box;
        }
        .submit-btn {
            width: 100%; padding: 14px; background: #000; color: var(--text-primary-cyan);
            border: 1px solid var(--text-bamboo-green); cursor: pointer; border-radius: 6px; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">河洛咨询系统</h1>
    <p class="description">基于传统数术与系统论的前置研判服务。</p>
    <button id="open-contact-btn" class="contact-btn">立即沟通 (Initiate Request)</button>
</div>

<div id="contact-modal" class="modal-overlay">
    <div class="modal-content">
        <button id="close-modal-btn" class="close-btn">&times;</button>
        <h3 class="modal-title">时空对接意向登记</h3>
        <form id="public-contact-form">
            <div class="form-group"><label>如何称呼您</label><input type="text" id="contact-name" required></div>
            <div class="form-group"><label>联络方式 (Email/WeChat)</label><input type="text" id="contact-info" required></div>
            <div class="form-group"><label>核心诉求</label>
                <select id="contact-intent" required>
                    <option value="咨询研判">咨询研判</option>
                    <option value="关键抉择">关键抉择</option>
                    <option value="专业学习">专业学习</option>
                </select>
            </div>
            <div class="form-group"><label>背景简述</label><textarea id="contact-message" rows="3"></textarea></div>
            <button type="submit" id="submit-btn" class="submit-btn">提交意向</button>
        </form>
        <div id="submit-status" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
    </div>
</div>

<script>
    const modal = document.getElementById('contact-modal');
    document.getElementById('open-contact-btn').onclick = () => modal.style.display = 'flex';
    document.getElementById('close-modal-btn').onclick = () => modal.style.display = 'none';

    document.getElementById('public-contact-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('submit-status');
        btn.disabled = true; btn.textContent = '正在发送...';

        const payload = {
            name: document.getElementById('contact-name').value,
            contact: document.getElementById('contact-info').value,
            intent: document.getElementById('contact-intent').value,
            message: document.getElementById('contact-message').value
        };

        try {
            const res = await fetch('/api/public-contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                status.textContent = '意向已提交，稍后将与您联络。';
                document.getElementById('public-contact-form').reset();
            } else {
                status.textContent = '发送波动，请稍后再试。';
            }
        } catch { status.textContent = '系统异常，请稍后再试。'; }
        btn.disabled = false; btn.textContent = '提交意向';
    };
</script>

</body>
</html>
